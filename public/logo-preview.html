<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubLens Logo Preview</title>
<style>
  body { background: #0D1117; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'JetBrains Mono', monospace; color: #4D9BFF; }
  h1 { font-size: 14px; letter-spacing: 4px; color: #4D9BFF; margin-bottom: 32px; opacity: 0.7; }
  .logo-container { display: flex; gap: 32px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
  .logo-item { text-align: center; }
  .logo-item p { font-size: 11px; color: #5C5C61; margin-top: 12px; letter-spacing: 1px; }
  .dark-card { background: #161B22; border: 1px solid rgba(10,132,255,0.3); border-radius: 16px; padding: 24px; }
  img { display: block; }
</style>
</head>
<body>
<h1>HARDSUBX</h1>
<div class="logo-container">
  <div class="logo-item">
    <div class="dark-card">
      <img src="logo.svg" width="256" height="256" alt="SubLens Logo 256px">
    </div>
    <p>256 × 256</p>
  </div>
  <div class="logo-item">
    <div class="dark-card">
      <img src="logo.svg" width="128" height="128" alt="SubLens Logo 128px">
    </div>
    <p>128 × 128</p>
  </div>
  <div class="logo-item">
    <div class="dark-card">
      <img src="logo.svg" width="64" height="64" alt="SubLens Logo 64px">
    </div>
    <p>64 × 64</p>
  </div>
</div>
</body>
</html>
