name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-2022, macos-14]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        run: npm install -g pnpm@8
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Setup Rust (Ubuntu/Linux)
        if: runner.os == 'Linux'
        uses: dtolnay/rust-toolchain@stable
      
      - name: Setup Rust (Windows)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable
      
      - name: Setup Rust (macOS)
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VisionSub v${{ github.ref_name }}'
          releaseBody: |
            ## VisionSub v${{ github.ref_name }}
            
            Download the installer for your platform.
            
            See CHANGELOG for details.
          releaseDraft: false
          prerelease: false

  create-release:
    needs: build-tauri
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '**'
          path: artifacts
      
      - name: List artifacts
        run: find artifacts -type f -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.deb'
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
