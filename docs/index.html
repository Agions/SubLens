<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubLens 文档</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css" />
  <style>
    :root { --theme-color: #42b883; }
    .sidebar-toggle { background: var(--theme-color); }
  </style>
</head>
<body>
  <div id="app">加载中…</div>
  <script>
    window.$docsify = {
      name: 'SubLens',
      repo: 'Agions/SubLens',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: { depth: 3, placeholder: '搜索…' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/plugins/search.min.js"></script>
</body>
</html>
